<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoons | JavaFX in Browser</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: #eef4ff;
        background:
          radial-gradient(circle at top left, rgba(119, 166, 255, 0.28), transparent 30%),
          radial-gradient(circle at 80% 20%, rgba(240, 90, 107, 0.18), transparent 24%),
          linear-gradient(180deg, #07111e 0%, #090f19 100%);
      }

      .shell {
        width: min(1200px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .intro {
        margin-bottom: 16px;
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(8, 19, 34, 0.74);
        backdrop-filter: blur(18px);
      }

      .intro p {
        margin: 0;
        color: #9eb2d7;
        line-height: 1.6;
      }

      #cheerpj-display {
        min-height: 760px;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(119, 166, 255, 0.18);
        background: rgba(5, 12, 22, 0.96);
      }
    </style>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  </head>
  <body>
    <div class="shell">
      <div class="intro">
        <p>
          Original <code>spoons-game</code> JavaFX build hosted in-browser through CheerpJ. This
          wrapper mirrors the game resources locally and launches the existing compiled app without
          editing the sibling project source.
        </p>
      </div>
      <div id="cheerpj-display"></div>
    </div>

    <script>
      (async function () {
        try {
          await cheerpjInit();
          cheerpjCreateDisplay(960, 720, document.getElementById("cheerpj-display"));
          await cheerpjRunMain("game.Main", "/app/spoons-game.jar");
        } catch (error) {
          document.getElementById("cheerpj-display").innerHTML =
            '<div style="padding:24px;color:#eef4ff;font-family:monospace;">CheerpJ failed to start the original Spoons build in this browser session.</div>';
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
